name: CI

on:
    push:
        branches: [master]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      code:
                        - 'crates/**'
                        - 'wayle/**'
                        - 'resources/**'
                        - 'scripts/**'
                        - 'packaging/**'
                        - 'Cargo.*'
                        - '.github/workflows/ci.yml'

    lint:
        name: Lint
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs

            - name: Setup Rust
              run: |
                  rustup default stable
                  rustup toolchain install nightly --component rustfmt
                  rustup component add clippy

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: Swatinem/rust-cache@v2

            - name: Check formatting
              run: cargo +nightly fmt --all --check

            - name: Clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

            - name: Check icons exist
              run: ./scripts/ci/check-icons.sh

    test:
        name: Test
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs

            - name: Setup Rust
              run: rustup default stable

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: Swatinem/rust-cache@v2

            - name: Run tests
              run: cargo test --workspace --no-fail-fast

    build:
        name: Build
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs

            - name: Setup Rust
              run: rustup default stable

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: Swatinem/rust-cache@v2

            - name: Build workspace
              run: cargo build --workspace --release

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/release "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    ubuntu:
        name: Package (Ubuntu)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ubuntu:latest
        steps:
            - name: Install dependencies
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends \
                    build-essential \
                    ca-certificates \
                    clang \
                    cmake \
                    curl \
                    debhelper \
                    desktop-file-utils \
                    dpkg-dev \
                    git \
                    libfftw3-dev \
                    libgtk-4-dev \
                    libgtk4-layer-shell-dev \
                    libgtksourceview-5-dev \
                    libpipewire-0.3-dev \
                    libpulse-dev \
                    libudev-dev \
                    libxkbcommon-dev \
                    pkg-config

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable

            - name: Build workspace
              run: cargo build --workspace --release --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/release "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Ubuntu package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" deb

    fedora:
        name: Package (Fedora)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: fedora:latest
        steps:
            - name: Install dependencies
              run: |
                  dnf -y install \
                    clang \
                    cmake \
                    fftw-devel \
                    gcc \
                    git \
                    gtk4-devel \
                    gtk4-layer-shell-devel \
                    gtksourceview5-devel \
                    libxkbcommon-devel \
                    make \
                    pipewire-devel \
                    pkgconf-pkg-config \
                    pulseaudio-libs-devel \
                    rpm-build \
                    systemd-devel

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Install RPM build dependencies
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  DATE="$(LC_ALL=C date '+%a %b %d %Y')"
                  sed \
                    -e "s/@VERSION@/${VERSION}/g" \
                    -e "s/@DATE@/${DATE}/g" \
                    packaging/rpm/wayle.spec.in >/tmp/wayle.spec
                  dnf -y --setopt=install_weak_deps=False builddep /tmp/wayle.spec

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable

            - name: Build workspace
              run: cargo build --workspace --release --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/release "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Fedora package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" rpm

    ci-status:
        name: CI Status
        if: always()
        needs: [lint, test, build, ubuntu, fedora]
        runs-on: ubuntu-latest
        steps:
            - name: Check results
              run: |
                  if [[ "${{ needs.lint.result }}" == "failure" || \
                        "${{ needs.test.result }}" == "failure" || \
                        "${{ needs.build.result }}" == "failure" || \
                        "${{ needs.ubuntu.result }}" == "failure" || \
                        "${{ needs.fedora.result }}" == "failure" ]]; then
                    echo "One or more checks failed"
                    exit 1
                  fi
                  echo "All checks passed or were skipped"
