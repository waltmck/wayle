name: Release

on:
    push:
        tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always

jobs:
    changelog:
        name: Changelog
        runs-on: ubuntu-latest
        outputs:
            changelog: ${{ steps.changelog.outputs.changes }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Generate changelog
              id: changelog
              uses: requarks/changelog-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: ${{ github.ref_name }}
                  excludeTypes: build,chore,style

            - name: Verify tag matches Cargo.toml version
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  if [ -z "$CARGO_VERSION" ]; then
                      echo "Failed to parse version from Cargo.toml"
                      exit 1
                  fi
                  if [ "$VERSION" != "$CARGO_VERSION" ]; then
                      echo "Tag $VERSION does not match Cargo.toml version $CARGO_VERSION"
                      exit 1
                  fi

            - name: Create GitHub release
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  body: ${{ steps.changelog.outputs.changes }}
                  draft: true
                  token: ${{ secrets.GITHUB_TOKEN }}

    build:
        name: Build (${{ matrix.arch }})
        needs: changelog
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        strategy:
            matrix:
                arch: [x86_64]
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    github-cli \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs

            - name: Setup Rust
              run: rustup default stable

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Build release binaries
              run: cargo build --release --locked

            - name: Build archive
              run: ./scripts/ci/build-archive.sh target/release "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}"

            - name: Upload to release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ARCH="${{ matrix.arch }}"
                  gh release upload "${{ github.ref_name }}" \
                    "wayle-${VERSION}-${ARCH}-linux.tar.gz" \
                    --clobber

    ubuntu:
        name: Package (Ubuntu ${{ matrix.arch }})
        needs: changelog
        runs-on: ubuntu-latest
        container:
            image: ubuntu:latest
        strategy:
            matrix:
                arch: [x86_64]
        steps:
            - name: Install dependencies
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends \
                    build-essential \
                    ca-certificates \
                    clang \
                    cmake \
                    curl \
                    debhelper \
                    desktop-file-utils \
                    dpkg-dev \
                    gh \
                    git \
                    libfftw3-dev \
                    libgtk-4-dev \
                    libgtk4-layer-shell-dev \
                    libgtksourceview-5-dev \
                    libpipewire-0.3-dev \
                    libpulse-dev \
                    libudev-dev \
                    libxkbcommon-dev \
                    pkg-config

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable

            - name: Build release binaries
              run: cargo build --release --locked

            - name: Build archive
              run: ./scripts/ci/build-archive.sh target/release "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}"

            - name: Build Ubuntu package
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ./scripts/ci/build-packages.sh "wayle-${VERSION}-${{ matrix.arch }}-linux.tar.gz" "${VERSION}" deb

            - name: Upload to release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "${{ github.ref_name }}" \
                    debbuild/DEBS/*/*.deb \
                    --clobber

    fedora:
        name: Package (Fedora ${{ matrix.arch }})
        needs: changelog
        runs-on: ubuntu-latest
        container:
            image: fedora:latest
        strategy:
            matrix:
                arch: [x86_64]
        steps:
            - name: Install dependencies
              run: |
                  dnf -y install \
                    clang \
                    cmake \
                    fftw-devel \
                    gcc \
                    gh \
                    git \
                    gtk4-devel \
                    gtk4-layer-shell-devel \
                    gtksourceview5-devel \
                    libxkbcommon-devel \
                    make \
                    pipewire-devel \
                    pkgconf-pkg-config \
                    pulseaudio-libs-devel \
                    rpm-build \
                    systemd-devel

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Install RPM build dependencies
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  DATE="$(LC_ALL=C date '+%a %b %d %Y')"
                  sed \
                    -e "s/@VERSION@/${VERSION}/g" \
                    -e "s/@DATE@/${DATE}/g" \
                    packaging/rpm/wayle.spec.in >/tmp/wayle.spec
                  dnf -y --setopt=install_weak_deps=False builddep /tmp/wayle.spec

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable

            - name: Build release binaries
              run: cargo build --release --locked

            - name: Build archive
              run: ./scripts/ci/build-archive.sh target/release "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}"

            - name: Build Fedora package
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ./scripts/ci/build-packages.sh "wayle-${VERSION}-${{ matrix.arch }}-linux.tar.gz" "${VERSION}" rpm

            - name: Upload to release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  ARCH="${{ matrix.arch }}"
                  gh release upload "${{ github.ref_name }}" \
                    rpmbuild/RPMS/${ARCH}/*.rpm \
                    --clobber

    checksums:
        name: Checksums
        needs: [changelog, build, ubuntu, fedora]
        runs-on: ubuntu-latest
        steps:
            - name: Download assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release download "${{ github.ref_name }}" \
                    --repo "${{ github.repository }}" \
                    --pattern "*.tar.gz" \
                    --pattern "*.deb" \
                    --pattern "*.rpm" \
                    --dir release

            - name: Generate SHA256SUMS
              run: cd release && sha256sum *.tar.gz *.deb *.rpm > ../SHA256SUMS

            - name: Upload checksums
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload "${{ github.ref_name }}" --repo "${{ github.repository }}" SHA256SUMS --clobber

    publish:
        name: Publish release
        needs: checksums
        runs-on: ubuntu-latest
        steps:
            - name: Undraft release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
